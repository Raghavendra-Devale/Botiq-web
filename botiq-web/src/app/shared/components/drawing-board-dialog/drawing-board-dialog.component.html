<div class="dialog-header">
  <h2 mat-dialog-title class="dialog-title-text">
    <mat-icon>edit_note</mat-icon> Handwritten Note / Sketch
  </h2>
  <button mat-icon-button (click)="cancel()" class="close-btn" title="Close">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content class="dialog-content-custom">
  <!-- Toolbar for Pen Options -->
  <div class="canvas-toolbar">
    <!-- Mode Selection (Pen vs Eraser) -->
    <div class="toolbar-group">
      <span class="group-label">Tool</span>
      <button mat-icon-button [class.tool-active]="!isEraser" (click)="selectPen()" title="Draw Tool">
        <mat-icon>brush</mat-icon>
      </button>
      <button mat-icon-button [class.tool-active]="isEraser" (click)="selectEraser()" title="Eraser Tool">
        <mat-icon>auto_fix_normal</mat-icon>
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Stroke Thickness -->
    <div class="toolbar-group">
      <span class="group-label">Thickness</span>
      <div class="thickness-options">
        <button mat-icon-button 
                *ngFor="let w of strokeWidths" 
                class="thickness-btn"
                [class.width-active]="selectedWidth === w.value"
                (click)="changeWidth(w.value)"
                [title]="w.label">
          <span class="dot-indicator" [style.width.px]="w.value" [style.height.px]="w.value"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Drawing Area -->
  <div class="canvas-wrapper">
    <canvas #canvas></canvas>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions-custom">
  <button mat-button class="action-btn-secondary" (click)="undo()" [disabled]="isCanvasEmpty()">
    <mat-icon>undo</mat-icon> Undo
  </button>
  <button mat-button class="action-btn-secondary" (click)="clear()" [disabled]="isCanvasEmpty()">
    <mat-icon>delete_outline</mat-icon> Clear All
  </button>
  <div class="spacer"></div>
  <button mat-button class="action-btn-secondary" (click)="cancel()">
    Cancel
  </button>
  <button mat-raised-button color="primary" class="save-btn" (click)="save()" [disabled]="isCanvasEmpty()">
    <mat-icon>save</mat-icon> Save Note
  </button>
</mat-dialog-actions>
