<div class="container">

    <h2>{{ isEditMode ? 'Edit Partner' : 'Add Partner' }}</h2>

    <form #partnerForm="ngForm" (ngSubmit)="onSubmit(partnerForm)" class="form">

        <!-- Row -->
        <div class="row">
            <div class="field">
                <label>Name *</label>
                <input type="text" name="name" [(ngModel)]="partner.name" required #name="ngModel" />
                <span class="error" *ngIf="name.invalid && name.touched">Required</span>
            </div>

            <div class="field">
                <label>Phone *</label>
                <input type="text" name="phone" [(ngModel)]="partner.phone" required pattern="[0-9]{10}"
                    #phone="ngModel" />
                <span class="error" *ngIf="phone.invalid && phone.touched">
                    Invalid phone
                </span>
            </div>
        </div>

        <!-- Category -->
        <div class="field">
            <label>Category *</label>
            <select [(ngModel)]="partner.partnerCategory" name="category" required>
                <option [ngValue]="null">Select</option>
                <option *ngFor="let cat of selectCategory" [ngValue]="cat">
                    {{ cat.key_name }}
                </option>
            </select>
        </div>

        <!-- Address -->
        <div class="field">
            <label>Address</label>
            <input type="text" name="address" [(ngModel)]="partner.address" />
        </div>

        <!-- Notes -->
        <div class="field">
            <label>Notes</label>
            <textarea name="notes" [(ngModel)]="partner.notes"></textarea>
        </div>

        <!-- Status -->
        <div class="status">
            <label>Status</label>
            <input type="checkbox" [(ngModel)]="partner.status" name="status" />
            <span>{{ partner.status ? 'Active' : 'Inactive' }}</span>
        </div>

        <!-- Actions -->
        <div class="actions">
            <button type="button" (click)="router.navigate(['/partners-list'])">
                Cancel
            </button>
            <button type="submit">
                {{ isEditMode ? 'Update Partner' : 'Save Partner' }}
            </button>
        </div>

    </form>
</div>
