<div class="auth-layout">
    <!-- Left Side Branding -->
    <div class="brand-panel">
        <div class="brand-content">
            <h1>Botiq<span class="dot">.</span></h1>
            <h2>Manage your business<br>effortlessly.</h2>
            <p>Streamline orders, inventory, and customer relationships in one intelligent dashboard designed specifically for your boutique.</p>
        </div>
        <div class="brand-overlay"></div>
    </div>

    <!-- Right Side Form -->
    <div class="form-panel">
        <div class="form-container">
            <div class="mobile-logo">Botiq<span>.</span></div>

            <h2 class="title">Welcome Back</h2>
            <p class="subtitle">Login using your phone number to continue</p>

            <div class="phone-input">
                <span class="country-code">+91</span>
                <input type="tel" [(ngModel)]="phoneNumber" placeholder="Enter phone number" maxlength="10" />
            </div>

            <button class="btn-primary" (click)="requestOtp()" [disabled]="!phoneNumber || phoneNumber.length < 10">
                Send OTP
                <i class="fas fa-arrow-right"></i>
            </button>

            <p class="register-text">
                New to Botiq?
                <span routerLink="/register">Create an account</span>
            </p>

            <div id="recaptcha-container"></div>
        </div>
    </div>
</div>
