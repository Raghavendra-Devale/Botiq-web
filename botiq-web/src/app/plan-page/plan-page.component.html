<div class="plan-container">


    <form class="plan-form">
        <!-- Current Plan Section -->
        <section class="current-plan card" *ngIf="currentPlan">
            <div class="card-header">
                <span class="badge">Current Plan</span>
                <h3 class="plan-title">{{ currentPlan.plan_type }}</h3>
            </div>
            <div class="card-body">
                <div class="detail-row">
                    <span class="label">End Date:</span>
                    <span class="value">{{ currentPlan.plan_end_date | date:'mediumDate' }}</span>
                </div>
            </div>
        </section>

        <!-- Available Plans -->
        <div class="available-plans">
            <h3 class="section-title">Available Plans</h3>

            <div class="plan-card" *ngFor="let plan of planMaster; let i = index"
                [class.active]="plan.plan_type === currentPlan?.plan_type"
                [class.selected]="selectedPlan?.plan_type === plan.plan_type">

                <label class="plan-card-main">
                    <div class="radio-wrapper">
                        <input type="radio" name="plan" [value]="plan.plan_type" (change)="selectedPlan = plan"
                            [checked]="selectedPlan?.plan_type === plan.plan_type">
                    </div>

                    <div class="plan-info">
                        <div class="plan-info-header">
                            <h4 class="plan-name">{{ plan.plan_info.plan_type }} Plan</h4>
                            <p class="plan-price">
                                {{ plan.plan_info.plan_cost !== null ? ('₹ ' + plan.plan_info.plan_cost) : 'Custom
                                Pricing' }}
                                <span class="price-suffix" *ngIf="plan.plan_info.plan_cost !== null">/mo</span>
                            </p>
                        </div>
                        <p class="plan-desc highlight">{{ plan.plan_info.offer_details }}</p>
                    </div>
                </label>

                <!-- Accordion for features -->
                <div class="accordion">
                    <div class="accordion-header" (click)="toggleAccordion(i)" [class.open]="openIndex === i">
                        <span>{{ openIndex === i ? 'Hide Features' : 'View Features' }}</span>
                        <span class="icon">{{ openIndex === i ? '▲' : '▼' }}</span>
                    </div>

                    <div class="accordion-body" *ngIf="openIndex === i">
                        <ul class="feature-list">
                            <li *ngFor="let feature of plan.plan_info.features_included">
                                <span class="check-icon"></span> <span class="feature-text">{{ feature }}</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- CTA -->
        <div class="actions">
            <button type="button" class="btn-primary" [disabled]="!selectedPlan">
                Request Callback
            </button>
        </div>
    </form>
</div>
