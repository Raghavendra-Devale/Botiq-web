<div class="page-container">
    <!-- Header -->
    <header class="app-header">
        <h2 class="page-title">Orders</h2>
        <button class="icon-btn header-menu-btn" (click)="toggleMenu()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="1" />
                <circle cx="12" cy="5" r="1" />
                <circle cx="12" cy="19" r="1" />
            </svg>
        </button>
    </header>

    <!-- Popover dropdown -->
    <div *ngIf="isPopoverOpen" class="popover-menu">
        <button class="popover-btn" (click)="exportOrders()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Export Orders
        </button>
    </div>

    <div class="scroll-content">
        <!-- Notes Banner -->
        <div *ngFor="let note of notes" class="alert note-alert" [ngClass]="getNoteClass(note)">
            <svg class="alert-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
            <span class="alert-text">{{ note.message_text }}</span>
        </div>

        <!-- Plan Expiry Banner -->
        <div *ngIf="daysLeft !== null && daysLeft <= 30" class="alert plan-alert"
            [ngClass]="daysLeft <= 7 ? 'danger-alert' : 'warning-alert'">
            <div class="plan-content">
                <div class="plan-info">
                    <strong>{{ currentPlan?.plan_type }}</strong>
                    <span class="subtext">{{ daysLeft }} days left</span>
                </div>
                <button class="btn-renew" (click)="onBuyNowClick()">Renew Plan</button>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-container">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input class="search-input" [(ngModel)]="searchQuery" (input)="onSearchInput($event)"
                placeholder="Search customers, orders..." />
        </div>

        <!-- Filter Segments -->
        <div class="segments-wrapper">
            <div class="segments">
                <button *ngFor="let tab of ['All','Pending','Started','Ready','Delivered','Hold']"
                    [class.active]="selectedSegment === tab" (click)="onSegmentChange(tab)" class="segment-btn">
                    {{ tab }}
                </button>
            </div>
        </div>

        <!-- Order List -->
        <div class="order-list">
            <div *ngFor="let order of filteredOrders; let i = index" (click)="editOrder(order)" class="order-card">
                <div class="card-image-wrapper">
                    <img [src]="getImages(order)" class="card-image" alt="Order Image" />
                </div>

                <div class="card-body">
                    <div class="card-header">
                        <h3 class="customer-name">{{ order.customer_name }}</h3>
                        <span class="order-amount">₹{{ order.order_amount }}</span>
                    </div>

                    <p class="order-details">{{ order.formattedOrderDetails }}</p>

                    <div class="card-actions-row">
                        <div class="action-buttons">
                            <!-- Call -->
                            <button class="action-btn call-btn" (click)="makeCall(order.contact_number, $event)"
                                title="Call">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                                    </path>
                                </svg>
                            </button>
                            <!-- WhatsApp -->
                            <button class="action-btn wa-btn"
                                (click)="openWhatsApp(order.customer_name, order.contact_number, $event)"
                                title="WhatsApp">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                                    </path>
                                </svg>
                            </button>
                            <!-- Delete -->
                            <button class="action-btn delete-btn" (click)="removeOrder(order, i, $event)"
                                title="Delete">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path
                                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                    </path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="load-more-container" *ngIf="hasMore">
            <button class="btn-load-more" (click)="fetchOrders(false)">Load More</button>
        </div>
    </div>

    <!-- Add New Order FAB -->
    <button class="fab" (click)="addNewOrder()" title="Add New Order">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>
</div>
