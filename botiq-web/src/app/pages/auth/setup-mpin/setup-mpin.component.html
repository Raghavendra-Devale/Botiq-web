<div class="auth-layout">
  <!-- Left Side Branding -->
  <div class="brand-panel">
    <div class="brand-content">
      <h1>Botiq<span class="dot">.</span></h1>
      <h2>Secure your business<br>effortlessly.</h2>
      <p>Configure a secure device PIN to enable fast, single-tap logins without waiting for SMS OTPs every time.</p>
    </div>
    <div class="brand-overlay"></div>
  </div>

  <!-- Right Side Form -->
  <div class="form-panel">
    <div class="form-container">
      <div class="mobile-logo">Botiq<span>.</span></div>

      <div class="icon-header">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.57-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
          </svg>
        </div>
      </div>

      <h2 class="title">Create Secure PIN</h2>
      <p class="subtitle">Set up a 6-digit MPIN for quick access on this device</p>

      <div class="setup-form">
        <!-- New MPIN -->
        <div class="form-group">
          <label for="mpin">Enter 6-Digit MPIN</label>
          <div class="pin-input-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            <input type="password" id="mpin" name="mpin" maxlength="6" [(ngModel)]="mpin" placeholder="••••••" required pattern="[0-9]*" inputmode="numeric" autocomplete="new-password">
          </div>
        </div>

        <!-- Confirm MPIN -->
        <div class="form-group">
          <label for="confirmMpin">Confirm MPIN</label>
          <div class="pin-input-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            <input type="password" id="confirmMpin" name="confirmMpin" maxlength="6" [(ngModel)]="confirmMpin" placeholder="••••••" required pattern="[0-9]*" inputmode="numeric" autocomplete="new-password">
          </div>
        </div>

        <!-- Error Panel -->
        @if (error) {
          <div class="error-message">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <span>{{ error }}</span>
          </div>
        }

        <!-- Submit Button -->
        <button class="btn-primary" (click)="setupMpin()" [disabled]="loading || mpin.length !== 6 || confirmMpin.length !== 6">
          @if (!loading) {
            <span>Configure PIN</span>
          }
          @if (loading) {
            <div class="spinner"></div>
          }
        </button>
      </div>

    </div>
  </div>
</div>
